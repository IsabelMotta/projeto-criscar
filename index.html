<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CrisCar Autos - Veículos</title>
    <style>
        body { 
            background-color: #4a0e0e; 
            color: white; 
            font-family: Arial, sans-serif; 
            margin: 0; 
            padding: 0; 
            text-align: center; 
        }

        
        .navbar-container {
            display: flex;
            align-items: stretch;
            margin: 10px auto;
            max-width: 95%;
            box-shadow: 0px 4px 15px rgba(0,0,0,0.4);
        }

        
        .logo-box {
            background-color: black;
            padding: 10px 25px;
            display: flex;
            align-items: center;
            clip-path: polygon(0% 0%, 100% 0%, 88% 100%, 0% 100%); 
            z-index: 2;
            flex-shrink: 0;
        }

        .logo-box img {
            height: 40px;
            width: auto;
        }

        
        .header {
            background: #ccc;
            color: black;
            flex-grow: 1;
            display: flex;
            justify-content: space-around;
            align-items: center;
            font-weight: bold;
            font-size: 11px;
            text-transform: uppercase;
            margin-left: -25px;
            padding-left: 30px;
        }

        .header span { cursor: pointer; white-space: nowrap; }

        
        .banner-img { 
            width: 95%; 
            max-width: 900px; 
            border-radius: 10px; 
            margin: 10px 0;
        }

        
        .grid { 
            display: grid; 
            grid-template-columns: 1fr 1fr; 
            gap: 20px; 
            max-width: 900px; 
            margin: 0 auto; 
            padding: 20px;
        }

        .car-link img { 
            width: 100%; 
            border-radius: 10px; 
            display: block; 
            box-shadow: 0 4px 8px rgba(0,0,0,0.5); 
        }

        
        @media (max-width: 600px) {
            .navbar-container { margin: 5px auto; }
            
            .logo-box { padding: 8px 15px; }
            .logo-box img { height: 25px; } 

            .header { 
                font-size: 7px; 
                margin-left: -15px;
                padding-left: 20px;
            }

            .grid { 
                grid-template-columns: 1fr; 
                gap: 15px;
            }
        }
    </style>
</head>
<body>

    <div class="navbar-container">
        <div class="logo-box">
            <img src="logocriscar.jfif" alt="Logo CrisCar">
        </div>
        <div class="header">
            <span>VEÍCULOS</span>
            <span>LOCALIZAÇÃO</span>
            <span>CONTATO</span>
            <span>EMPRESA</span>
            <span>FINANCIAMENTO</span>
        </div>
    </div>

    <img src="layoutcriscar.jfif" class="banner-img" alt="Banner">

    <div class="grid">
        <a href="https://wa.me/5512991082086?text=Olá,%20tenho%20interesse%20no%20Polo!" target="_blank" class="car-link">
            <img src="carro1.jfif" alt="Polo">
        </a>
        <a href="https://wa.me/5512991082086?text=Olá,%20tenho%20interesse%20no%20Honda%20Fit!" target="_blank" class="car-link">
            <img src="carro2.jfif" alt="Honda Fit">
        </a>
        <a href="https://wa.me/5512991082086?text=Olá,%20tenho%20interesse%20no%20HB20X!" target="_blank" class="car-link">
            <img src="carro3.jfif" alt="HB20X">
        </a>
        <a href="https://wa.me/5512991082086?text=Olá,%20tenho%20interesse%20no%20Honda%20City!" target="_blank" class="car-link">
            <img src="carro4.jfif" alt="Honda City">
        </a>
    </div>

</body>
</html>
